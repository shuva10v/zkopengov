services:
  indexer:
    build: .
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - PORT=3001
      - TREE_DEPTH=20
      - CACHE_DIR=/app/data
    volumes:
      - indexer-data:/app/data
    deploy:
      resources:
        limits:
          memory: 8g
    restart: unless-stopped

volumes:
  indexer-data:
